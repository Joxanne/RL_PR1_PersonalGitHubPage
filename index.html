<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huan Chen - Personal Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette */
            --bg-base: #0a0514;
            --grad-1: #240b36;
            --grad-2: #16072b;
            --primary: #b05bff;
            --secondary: #d69eff;
            --text-main: #ffffff;
            --text-muted: #d0c8db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-base), var(--grad-1), var(--grad-2));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite alternate;
            overflow: hidden;
            color: var(--text-main);
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            animation: float 12s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(176, 91, 255, 0.45);
            top: 5%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: rgba(214, 158, 255, 0.35);
            bottom: -5%;
            right: 5%;
            animation-delay: -4s;
            animation-duration: 15s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(103, 20, 191, 0.6);
            top: 45%;
            left: 55%;
            animation-delay: -7s;
            animation-duration: 10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(0, -50px) scale(1.05); }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 3.5rem 4.5rem;
            text-align: center;
            z-index: 10;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border 0.4s ease;
            max-width: 90%;
            width: 500px;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUpAnim 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeUpAnim {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }

        /* Typography */
        .name {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
            background: linear-gradient(to right, #ffffff, #e0b3ff, #b05bff, #ffffff);
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 5s linear infinite;
            letter-spacing: -1px;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .date {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .clock-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
        }

        .clock-container {
            background: rgba(0, 0, 0, 0.25);
            padding: 1.5rem 2rem;
            border-radius: 18px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.3);
        }

        .clock {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
            margin: 0;
            background: linear-gradient(180deg, #ffffff, #d69eff);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(176, 91, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card { 
                padding: 2.5rem 2rem; 
                width: 100%;
            }
            .name { font-size: 3rem; }
            .clock { font-size: 3rem; }
            .date { font-size: 1rem; margin-bottom: 2rem; }
            .clock-container { padding: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <h1 class="name fade-up delay-1">Huan Chen</h1>
        <div class="date fade-up delay-2" id="dateElement">Loading date...</div>
        
        <div class="clock-wrapper fade-up delay-3">
            <div class="clock-container">
                <div class="clock" id="clockElement">00:00:00</div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Format time: HH:MM:SS
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockElement').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format date: e.g., Tuesday, February 24, 2026
            const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('dateElement').textContent = dateString;
        }

        // Initialize immediately to prevent layout jumps
        updateTime();
        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
